<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghosted Apps | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/app/app.css" />
  </head>
  <body class="app-page">
    <header class="app-header">
      <div class="container app-header__inner">
        <a class="brand" href="/">Ghosted</a>
        <nav class="app-nav">
          <a class="app-nav__link" href="/app/">Apps</a>
          <a class="app-nav__link" href="https://www.twitch.tv/vghosted" target="_blank" rel="noopener noreferrer">Twitch</a>
          <a class="app-nav__link is-active" href="/admin/">Admin</a>
        </nav>
        <div class="app-auth" data-auth></div>
      </div>
    </header>
    <main class="container app-main" data-page="admin">
      <section class="app-masthead">
        <div class="app-masthead__copy">
          <p class="app-kicker">Admin Surface</p>
          <h1 class="app-title">Operate the control desk</h1>
          <p class="app-description">Manage rewards, giveaways, and site content for the Ghosted and vghosted community.</p>
        </div>
      </section>
      <div class="app-banner-slot" data-banner></div>
      <section class="app-summary-grid" data-summary></section>
      <section data-content></section>
    </main>
    <script src="/app/app.js"></script>
  </body>
</html>
