<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghosted Apps | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/app/app.css" />
  </head>
  <body class="app-page">
    <a class="site-skip-link" href="#main-content">Skip to main content</a>
    <header class="app-header">
      <div class="container app-header__inner">
        <a class="brand" href="/">Ghosted</a>
        <nav class="app-nav" aria-label="Primary">
          <a class="app-nav__link" href="/design/">About</a>
          <a class="app-nav__link" href="/app/">App Hub</a>
          <a class="app-nav__link" href="https://www.twitch.tv/vghosted" rel="noopener noreferrer">Twitch</a>
          <a class="app-nav__link" href="/app/casino/">Casino</a>
          <a class="app-nav__link" href="/app/giveaways/">Giveaways</a>
          <a class="app-nav__link" href="/app/rewards/">Rewards</a>
          <a class="app-nav__link is-active" href="/app/profile/" aria-current="page">Profile</a>
        </nav>
        <div class="app-auth" data-auth></div>
      </div>
    </header>
    <main class="container app-main" id="main-content" data-page="profile">
      <section class="app-masthead">
        <div class="app-masthead__copy">
          <p class="app-kicker">Profile</p>
          <h1 class="app-title">Account</h1>
          <p class="app-description">Discord identity, synced roles, perks, and points across the Ghosted community.</p>
        </div>
      </section>
      <div class="app-banner-slot" data-banner></div>
      <section class="app-summary-grid" data-summary></section>
      <section data-content></section>
    </main>
    <script src="/site.js"></script>
    <script src="/app/app.js"></script>
  </body>
</html>
