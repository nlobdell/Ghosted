<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghosted Apps | Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/app/app.css" />
  </head>
  <body class="app-page">
    <a class="site-skip-link" href="#main-content">Skip to main content</a>
    <header class="app-header">
      <div class="container app-header__inner">
        <a class="brand" href="/">Ghosted</a>
        <div class="app-header__shell" data-site-shell>
          <div class="site-nav-drawer">
            <nav class="app-nav" aria-label="Primary" data-site-nav>
              <button class="button button--secondary button--small site-nav-close" type="button" data-site-nav-close>Close</button>
              <a class="app-nav__link" href="/design/">About</a>
              <a class="app-nav__link" href="/app/">App Hub</a>
              <a class="app-nav__link is-active" href="/app/community/" aria-current="page">Community</a>
              <a class="app-nav__link" href="/app/rewards/">Rewards</a>
              <a class="app-nav__link" href="/app/giveaways/">Giveaways</a>
              <a class="app-nav__link" href="/app/casino/">Casino</a>
              <a class="app-nav__link" href="/app/profile/">Profile</a>
            </nav>
          </div>
          <div class="app-header__tools">
            <a class="button button--secondary button--small app-header__utility" href="https://www.twitch.tv/vghosted" rel="noopener noreferrer">Twitch</a>
            <div class="app-auth" data-auth></div>
            <button class="button button--secondary button--small site-menu-toggle" type="button" data-site-menu-toggle aria-label="Open navigation">
              <span class="site-menu-toggle__bars" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </div>
    </header>
    <main class="container app-main" id="main-content" data-page="community">
      <section class="app-masthead">
        <div class="app-masthead__copy">
          <p class="app-kicker">Community</p>
          <h1 class="app-title">Ghosted community overview</h1>
          <p class="app-description">See the current state of the Ghosted community, then jump deeper into clan and competition detail when you need it.</p>
        </div>
      </section>
      <div class="app-banner-slot" data-banner></div>
      <section class="app-summary-grid" data-summary></section>
      <section data-content></section>
    </main>
    <script src="/site.js"></script>
    <script src="/app/app.js"></script>
  </body>
</html>
