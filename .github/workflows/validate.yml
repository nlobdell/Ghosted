name: Validate Site And App

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Ensure required files exist
        run: |
          test -f index.html
          test -f styles.css
          test -f design/index.html
          test -f design/styles.css
          test -f server.py
          test -f app/index.html
          test -f app/app.js
          test -f app/app.css
          test -f admin/index.html

      - name: Block merge conflict markers
        run: |
          if grep -R -nE "^(<<<<<<<|=======|>>>>>>>)" .; then
            echo "Merge conflict markers found."
            exit 1
          fi

      - name: Basic HTML sanity check
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          for path in [
              'index.html',
              'design/index.html',
              'app/index.html',
              'app/casino/index.html',
              'app/rewards/index.html',
              'app/giveaways/index.html',
              'app/profile/index.html',
              'admin/index.html',
          ]:
              parser = Parser()
              parser.feed(Path(path).read_text(encoding='utf-8'))
              parser.close()
          print('HTML parsed successfully')
          PY

      - name: Validate Discord link presence
        run: |
          grep -n "discord.gg/ghosted" index.html
          grep -n "discord.gg/ghosted" design/index.html

      - name: Compile server
        run: python -m py_compile server.py
